name: takeout-superagent
display_name: ClawDot 外卖助手（超级 Agent）
description: >
  通过 ClawDot 外卖网关帮用户点外卖。
  超级 Agent 版本，支持一个 agent 服务多个用户。
version: 0.1.0
license: MIT
author: clawdot

category: life-services
tags: [food, delivery, ordering]
locale: zh-CN

auth_model: superagent

requires:
  bins: [python3]
  env:
    - name: GATEWAY_URL
      description: ClawDot Gateway API 地址
    - name: API_KEY
      description: ClawDot Gateway API 密钥
    - name: ADMIN_SECRET
      description: 超级 Agent 管理密钥，用于动态绑定用户

entry_point: scripts/takeout_superagent.py

actions:
  - name: addresses
    description: 查询、搜索、新建收货地址
  - name: search
    description: 按关键词搜索附近店铺
  - name: menu
    description: 三级菜单钻取（分类→商品→详情）
  - name: preview
    description: 预览订单（价格、配送费、优惠）
  - name: order
    description: 确认并提交订单
  - name: order_status
    description: 查询订单配送状态

platforms:
  - openclaw
